services:
  # Base de données PostgreSQL
  db:
    image: postgres:15
    container_name: mtg_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mtg_manager
    ports:
      - "5432:5432"

  # Interface graphique pour la BDD (accessible sur localhost:5050)
  pgadmin:
    image: dpage/pgadmin4
    container_name: mtg_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

  # API ASP.NET Core
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mtg_api
    ports:
      - "5000:8080"
    depends_on:
      - db
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=mtg_manager;Username=user;Password=password
      - ASPNETCORE_ENVIRONMENT=Development

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mtg_web
    ports:
      - "3000:80"
    depends_on:
      - backend